name: Update Moonfin

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

concurrency:
  group: update-moonfin
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v19

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install --yes jq

      - name: Update moonfin package version
        id: update
        run: |
          set -euo pipefail

          latest_tag="$(curl -fsSL https://api.github.com/repos/Moonfin-Client/Mobile-Desktop/releases/latest | jq -r '.tag_name')"
          version="${latest_tag#v}"
          src_url="https://github.com/Moonfin-Client/Mobile-Desktop/archive/refs/tags/${version}.tar.gz"
          src_hash="$(nix store prefetch-file --json --unpack "$src_url" | jq -r '.hash')"

          sed -i -E "s/version = \"[^\"]+\";/version = \"${version}\";/" pkgs/moonfin.nix
          sed -i -E "s#hash = \"sha256-[^\"]+\";#hash = \"${src_hash}\";#" pkgs/moonfin.nix

          if git diff --quiet -- pkgs/moonfin.nix; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Commit and push update
        if: steps.update.outputs.changed == 'true'
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add pkgs/moonfin.nix
          git commit -m "chore: update moonfin to ${{ steps.update.outputs.version }}"
          git push
